{{define "result"}}
<div class="mt-6 p-5 bg-white rounded-md outline-1 outline-slate-200 text-left">
  <p class="text-xs text-slate-400 mb-1">Your short link is ready</p>

  <div class="flex items-center gap-2">
    <a href="{{.Short}}" target="_blank"
      class="flex-1 text-sky-800 font-semibold text-lg truncate hover:underline">
      {{.Short}}
    </a>
    <button
      onclick="navigator.clipboard.writeText('{{.Short}}')"
      class="flex-none px-3 py-1.5 text-xs font-semibold border border-slate-200
             rounded-md hover:bg-slate-50 cursor-pointer transition">
      Copy
    </button>
  </div>

  <p class="text-xs text-slate-400 mt-2 truncate">Original: {{.Original}}</p>
</div>
{{end}}
